<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Curtain Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #0f0f0f; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      padding-top: 59px;
    }
    #curtain {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      background: red;
      z-index: 9999;
      will-change: transform;
    }
    /* Log visible en permanence juste sous le rideau */
    #log {
      position: fixed;
      top: 62px;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.92);
      border-bottom: 1px solid #444;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      color: yellow;
      font-family: monospace;
      z-index: 9998;
      line-height: 1.5;
    }
    .item {
      padding: 1.5rem;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
    }
    input {
      display: block;
      width: calc(100% - 3rem);
      margin: 1.5rem;
      padding: 1rem;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div id="curtain"></div>
<div id="log">en attente...</div>

<!-- padding pour le log fixe -->
<div style="height: 2rem"></div>

<div class="item">Ligne 1 — scroll vers le bas</div>
<div class="item">Ligne 2</div>
<div class="item">Ligne 3</div>
<div class="item">Ligne 4</div>
<div class="item">Ligne 5</div>
<div class="item">Ligne 6</div>
<input type="text" placeholder="Tape ici pour ouvrir le clavier...">
<div class="item">Ligne 7</div>
<div class="item">Ligne 8</div>
<div class="item">Ligne 9</div>
<div class="item">Ligne 10</div>
<div class="item">Ligne 11</div>
<div class="item">Ligne 12</div>
<div class="item">Ligne 13</div>
<div class="item">Ligne 14</div>
<div class="item">Ligne 15</div>
<div class="item">Ligne 16</div>
<div class="item">Ligne 17</div>
<div class="item">Ligne 18</div>
<div class="item">Ligne 19</div>
<div class="item">Ligne 20 — fin</div>

<script>
  const log     = document.getElementById('log');
  const curtain = document.getElementById('curtain');
  const vv      = window.visualViewport;

  function update(label) {
    if (!vv) return;
    const cTop = curtain.getBoundingClientRect().top;
    log.innerHTML =
      '<b>' + label + '</b><br>' +
      'offsetTop: ' + vv.offsetTop.toFixed(1) +
      ' | scrollY: ' + window.scrollY.toFixed(1) +
      ' | vv.height: ' + vv.height.toFixed(0) +
      '<br>curtain.top (bounding): ' + cTop.toFixed(1);
  }

  const initVVH = vv ? vv.height : window.innerHeight;
  let kbOpen = false;

  const pinCurtain = () => {
    curtain.style.transform = 'translateY(' + Math.max(0, vv.offsetTop) + 'px)';
  };

  const resetCurtain = () => {
    curtain.style.transform = 'translateY(0px)';
  };

  if (vv) {
    vv.addEventListener('resize', () => {
      const wasOpen = kbOpen;
      kbOpen = (initVVH - vv.height) > 100;
      if (kbOpen) {
        pinCurtain();
      } else if (wasOpen) {
        resetCurtain(); // clavier fermé → reset
      }
      update('vv.resize kbOpen=' + kbOpen);
    }, { passive: true });

    vv.addEventListener('scroll', () => {
      if (kbOpen) pinCurtain(); // pin uniquement si clavier ouvert
      update('vv.scroll kbOpen=' + kbOpen);
    }, { passive: true });
  }

  window.addEventListener('scroll', () => update('window.scroll'), { passive: true });
  update('init');
</script>
</body>
</html>
