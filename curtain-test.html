<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clip Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* html + body : hauteur exacte du viewport dynamique, pas de scroll window */
    html {
      height: 100dvh;
      overflow: hidden;
      background: #0f0f0f;
    }
    body {
      height: 100%;
      overflow: hidden;
      /* padding-top pousse le contenu sous la status bar */
      padding-top: env(safe-area-inset-top, 59px);
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
    }

    /* Scroll interne — le contenu ne peut PAS sortir au-dessus de ce div */
    #scroll {
      height: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    .item {
      padding: 1.5rem;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
    }
    input {
      display: block;
      width: calc(100% - 3rem);
      margin: 1.5rem;
      padding: 1rem;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div id="scroll">
  <div class="item">Ligne 1 — scroll vers le bas</div>
  <div class="item">Ligne 2</div>
  <div class="item">Ligne 3</div>
  <div class="item">Ligne 4</div>
  <div class="item">Ligne 5</div>
  <div class="item">Ligne 6</div>
  <input type="text" placeholder="Tape ici pour ouvrir le clavier...">
  <div class="item">Ligne 7</div>
  <div class="item">Ligne 8</div>
  <div class="item">Ligne 9</div>
  <div class="item">Ligne 10</div>
  <div class="item">Ligne 11</div>
  <div class="item">Ligne 12</div>
  <div class="item">Ligne 13</div>
  <div class="item">Ligne 14</div>
  <div class="item">Ligne 15</div>
  <div class="item">Ligne 16</div>
  <div class="item">Ligne 17</div>
  <div class="item">Ligne 18</div>
  <div class="item">Ligne 19</div>
  <div class="item">Ligne 20 — fin</div>
</div>
</body>
</html>
