<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clip Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #0f0f0f; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      padding-top: var(--safe-top, 59px);
    }

    /* Rideau CSS pur — AUCUN JS.
       Hypothèse : une fois le clavier stable (vv.offsetTop = 0),
       position:fixed top:0 est au bon endroit. */
    #curtain {
      position: fixed;
      top: 0;
      left: 0; right: 0;
      height: var(--safe-top, 59px);
      background: red;
      z-index: 9999;
    }

    .item {
      padding: 1.5rem;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
    }

    input {
      display: block;
      width: calc(100% - 3rem);
      margin: 1.5rem;
      padding: 1rem;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 1rem;
    }

    #log {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.9);
      border-top: 1px solid #444;
      padding: 0.4rem 1rem;
      font-size: 0.65rem;
      color: yellow;
      font-family: monospace;
      z-index: 9998;
    }
  </style>
</head>
<body>

<div id="curtain"></div>
<div id="log">init</div>

<div class="item">Ligne 1 — scroll vers le bas</div>
<div class="item">Ligne 2</div>
<div class="item">Ligne 3</div>
<div class="item">Ligne 4</div>
<div class="item">Ligne 5</div>
<div class="item">Ligne 6</div>
<input type="text" placeholder="Tape ici pour ouvrir le clavier...">
<div class="item">Ligne 7</div>
<div class="item">Ligne 8</div>
<div class="item">Ligne 9</div>
<div class="item">Ligne 10</div>
<div class="item">Ligne 11</div>
<div class="item">Ligne 12</div>
<div class="item">Ligne 13</div>
<div class="item">Ligne 14</div>
<div class="item">Ligne 15</div>
<div class="item">Ligne 16</div>
<div class="item">Ligne 17</div>
<div class="item">Ligne 18</div>
<div class="item">Ligne 19</div>
<div class="item">Ligne 20 — fin</div>

<script>
  if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
    document.documentElement.style.setProperty('--safe-top', '59px');
  }

  const log = document.getElementById('log');
  const vv  = window.visualViewport;

  function update(label) {
    log.textContent =
      label +
      ' | scrollY:' + window.scrollY.toFixed(0) +
      ' | vv.offT:' + (vv ? vv.offsetTop.toFixed(1) : '—') +
      ' | vv.h:' + (vv ? vv.height.toFixed(0) : '—');
  }

  window.addEventListener('scroll', () => update('win.scroll'), { passive: true });
  if (vv) {
    vv.addEventListener('scroll', () => update('vv.scroll'),   { passive: true });
    vv.addEventListener('resize', () => update('vv.resize'),   { passive: true });
  }
  update('init');
</script>
</body>
</html>
