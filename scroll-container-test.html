<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Scroll Container Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* html + body ne scrollent PAS — le scroll se passe dans #content */
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
    }

    /* Rideau — position: fixed fonctionne correctement
       car le window ne scrolle jamais */
    #curtain {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      background: red;
      z-index: 9999;
    }

    /* Container scrollable interne */
    #content {
      height: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      padding-top: 59px;
      color: #fff;
      font-family: sans-serif;
    }

    .item {
      padding: 1.5rem;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
    }

    input {
      display: block;
      width: calc(100% - 3rem);
      margin: 1.5rem;
      padding: 1rem;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 1rem;
    }

    #log {
      position: fixed;
      top: 62px;
      left: 0; right: 0;
      background: rgba(0,0,0,0.92);
      border-bottom: 1px solid #444;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      color: yellow;
      font-family: monospace;
      z-index: 9998;
    }
  </style>
</head>
<body>

<div id="curtain"></div>
<div id="log">en attente...</div>

<div id="content">
  <div style="height: 1.5rem"></div><!-- espace pour le log fixe -->
  <div class="item">Ligne 1 — scroll vers le bas</div>
  <div class="item">Ligne 2</div>
  <div class="item">Ligne 3</div>
  <div class="item">Ligne 4</div>
  <div class="item">Ligne 5</div>
  <div class="item">Ligne 6</div>
  <input type="text" placeholder="Tape ici pour ouvrir le clavier...">
  <div class="item">Ligne 7</div>
  <div class="item">Ligne 8</div>
  <div class="item">Ligne 9</div>
  <div class="item">Ligne 10</div>
  <div class="item">Ligne 11</div>
  <div class="item">Ligne 12</div>
  <div class="item">Ligne 13</div>
  <div class="item">Ligne 14</div>
  <div class="item">Ligne 15</div>
  <div class="item">Ligne 16</div>
  <div class="item">Ligne 17</div>
  <div class="item">Ligne 18</div>
  <div class="item">Ligne 19</div>
  <div class="item">Ligne 20 — fin</div>
</div>

<script>
  const log     = document.getElementById('log');
  const content = document.getElementById('content');
  const vv      = window.visualViewport;

  function update(label) {
    const vvOT = vv ? vv.offsetTop.toFixed(1) : '—';
    const vvH  = vv ? vv.height.toFixed(0)    : '—';
    log.textContent =
      label + ' | scrollTop: ' + content.scrollTop.toFixed(0) +
      ' | vv.offsetTop: ' + vvOT +
      ' | vv.h: ' + vvH;
  }

  // Le scroll se passe sur #content, pas window
  content.addEventListener('scroll', () => update('content.scroll'), { passive: true });

  if (vv) {
    vv.addEventListener('scroll', () => update('vv.scroll'),   { passive: true });
    vv.addEventListener('resize', () => update('vv.resize'),   { passive: true });
  }

  update('init');
</script>
</body>
</html>
