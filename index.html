<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab</title>

  <!-- ── PWA / icône ── -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vocab" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f0f0f'/%3E%3Ctext y='74' x='50' text-anchor='middle' font-size='68' font-family='Georgia,serif' fill='%23c9a96e'%3EV%3C/text%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2e2e2e;
      --text:    #e8e3d9;
      --muted:   #6b6560;
      --accent:  #c9a96e;
      --error:   #c96e6e;
      --success: #6ec98a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease;
    }
    .screen.active { display: flex; }

    .app-title {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    .app-subtitle {
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: -1.5rem;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="password"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    input[type="password"] { font-family: 'DM Mono', monospace; }
    input[type="password"]:focus, textarea:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem;
      transition: opacity 0.2s;
    }
    .btn-primary:hover    { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover    { border-color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--accent); }

    .btn-google {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: var(--accent); background: #222; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error-msg {
      color: var(--error);
      font-size: 0.85rem;
      font-style: italic;
      min-height: 1.2em;
      text-align: center;
    }
    .info-msg {
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Sélecteur de langue ── */
    .lang-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .lang-btn:hover { border-color: var(--accent); background: #222; transform: translateY(-2px); }
    .lang-btn .flag { font-size: 1.8rem; }
    .lang-btn .lang-name { font-size: 0.85rem; color: var(--muted); }

    /* ── Écran pratique ── */
    #screen-practice { max-width: 480px; }

    .practice-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }

    .lang-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .lang-tag:hover { border-color: var(--accent); }

    /* ── Carte du mot ── */
    .word-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }
    .word-label {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .word-main {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.2;
    }
    .word-meta { display: flex; align-items: center; gap: 0.75rem; }
    .word-count {
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }
    .stars { font-size: 0.95rem; letter-spacing: 0.05em; }
    .stars.s0 { color: var(--muted); }
    .stars.s1 { color: #c9a96e88; }
    .stars.s2 { color: var(--accent); }
    .stars.s3 { color: var(--success); }

    /* Badge "aide utilisée" */
    .hint-used-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      display: none;
    }
    .hint-used-badge.visible { display: inline-block; }

    /* ── Boîte définition ── */
    .hint-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text);
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .hint-box.visible { display: block; }
    .hint-box .hint-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    /* ── Zone phrase ── */
    .sentence-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .sentence-label { font-size: 0.85rem; color: var(--muted); font-style: italic; }

    /* ── Feedback ── */
    .feedback-box {
      width: 100%;
      border-radius: 8px;
      padding: 1.25rem;
      font-size: 0.92rem;
      line-height: 1.7;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .feedback-box.visible   { display: block; }
    .feedback-box.correct   { background: #0e2018; border: 1px solid var(--success); color: var(--success); }
    .feedback-box.incorrect { background: #200e0e; border: 1px solid var(--error);   color: var(--error); }
    .feedback-box .feedback-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .no-count-notice {
      font-size: 0.78rem;
      font-style: italic;
      opacity: 0.7;
      margin-top: 0.5rem;
    }

    /* ── Boutons action ── */
    .action-row { width: 100%; display: flex; gap: 0.75rem; }
    .action-row .btn-secondary { font-size: 0.9rem; padding: 0.75rem; }
    .action-row .btn-primary   { font-size: 0.9rem; padding: 0.75rem; }

    /* ── Écran stats ── */
    #screen-stats { max-width: 480px; }

    .stats-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .stats-lang-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .stats-lang-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .stats-lang-title .flag { font-size: 1.2rem; }

    .stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .stats-row .label { color: var(--muted); font-style: italic; }
    .stats-row .value { font-family: 'DM Mono', monospace; color: var(--text); }
    .stats-row .value.green  { color: var(--success); }
    .stats-row .value.yellow { color: var(--accent); }
    .stats-row .value.muted  { color: var(--muted); }

    /* Progress bar */
    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--success);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── Écran 1 : Mot de passe ── -->
  <div class="screen" id="screen-password">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <div class="input-group">
      <input type="password" id="pwd-input" placeholder="mot de passe" autofocus />
      <button class="btn-primary" onclick="checkPassword()">Entrer</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- ── Écran 2 : Connexion Google ── -->
  <div class="screen" id="screen-google">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <p class="info-msg">Connecte ton compte Google pour accéder<br/>à ta liste de vocabulaire.</p>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.09-6.09C34.46 3.09 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.08 5.5C12.43 13.61 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.59C43.18 37.13 46.1 31.27 46.1 24.5z"/>
        <path fill="#FBBC05" d="M10.72 28.28A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.72-4.28l-7.08-5.5A22.9 22.9 0 0 0 1 24c0 3.68.88 7.16 2.64 10.22l7.08-5.94z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.49-4.95l-7.19-5.59c-1.82 1.22-4.15 1.94-6.3 1.94-6.26 0-11.57-4.11-13.28-9.72l-7.08 5.94C7.07 41.52 14.82 47 24 47z"/>
      </svg>
      Se connecter avec Google
    </button>
    <p class="error-msg" id="google-error-msg"></p>
  </div>

  <!-- ── Écran 3 : Sélecteur de langue ── -->
  <div class="screen" id="screen-lang">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">quelle langue aujourd'hui ?</p>
    <div class="lang-grid">
      <button class="lang-btn" onclick="selectLanguage('English')">
        <span class="flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('Spanish')">
        <span class="flag">🇪🇸</span>
        <span class="lang-name">Español</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('French')">
        <span class="flag">🇫🇷</span>
        <span class="lang-name">Français</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('Greek')">
        <span class="flag">🇬🇷</span>
        <span class="lang-name">Ελληνικά</span>
      </button>
    </div>
    <button class="btn-ghost" onclick="showStats()">📊 voir mes statistiques</button>
    <p class="error-msg" id="lang-error-msg"></p>
  </div>

  <!-- ── Écran 4 : Pratique ── -->
  <div class="screen" id="screen-practice">
    <div class="practice-header">
      <h1 class="app-title">Vocab</h1>
      <div class="header-actions">
        <button class="btn-ghost" onclick="showStats()">📊</button>
        <span class="lang-tag" id="lang-tag" onclick="showScreen('screen-lang')">← langue</span>
      </div>
    </div>

    <div class="word-card">
      <span class="word-label">mot du jour</span>
      <span class="word-main" id="current-word">…</span>
      <div class="word-meta">
        <span class="stars s0" id="word-stars">☆☆☆</span>
        <span class="word-count" id="word-count"></span>
        <span class="hint-used-badge" id="hint-used-badge">💡 aide</span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-secondary" id="btn-hint" onclick="askHint()">💡 Définition</button>
      <button class="btn-primary"   id="btn-next" onclick="nextWord()">Autre mot →</button>
    </div>

    <div class="hint-box" id="hint-box">
      <div class="hint-label">Définition</div>
      <div id="hint-text"></div>
    </div>

    <div class="sentence-section">
      <p class="sentence-label">Utilise ce mot dans une phrase :</p>
      <textarea id="sentence-input" rows="3" placeholder="Écris ta phrase ici…"></textarea>
      <button class="btn-primary" id="btn-submit" onclick="submitSentence()">
        Vérifier ma phrase ✓
      </button>
    </div>

    <div class="feedback-box" id="feedback-box">
      <div class="feedback-label" id="feedback-label"></div>
      <div id="feedback-text"></div>
      <div class="no-count-notice" id="no-count-notice"></div>
    </div>
  </div>

  <!-- ── Écran 5 : Statistiques ── -->
  <div class="screen" id="screen-stats">
    <div class="stats-header">
      <h1 class="app-title">Stats</h1>
      <button class="btn-ghost" onclick="showScreen('screen-lang')">← retour</button>
    </div>
    <div class="stats-grid" id="stats-grid">
      <p style="color:var(--muted);font-style:italic;">Chargement…</p>
    </div>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────
    const PASSWORD_HASH = "37a3fe961eeb61778465d62305d999d7c1d550ee99af1efd530a61f1a03be39b";
    const CLIENT_ID     = "742808037031-61r1roac158e5ltrosgahkemc4r9e7n1.apps.googleusercontent.com";
    const SCOPES        = "https://www.googleapis.com/auth/spreadsheets";
    const SHEET_ID      = "1PlDftzA1wQYikkSRc-GDS0jvY_mOaj-M673TfAqxVxc";
    const MISTRAL_KEY   = "d4MPdq7upJvG0UU6xWJAOqYg2jyaZavU";
    const MISTRAL_MODEL = "mistral-medium-latest";   // ← medium pour meilleure qualité

    const KEY_PWD_OK    = "vocab_pwd_ok";
    const KEY_GG_TOKEN  = "vocab_google_token";
    const KEY_GG_EXPIRY = "vocab_google_expiry";

    const LANGS = [
      { key: 'English', flag: '🇬🇧', name: 'English',   mistralName: 'English' },
      { key: 'Spanish', flag: '🇪🇸', name: 'Español',   mistralName: 'Spanish' },
      { key: 'French',  flag: '🇫🇷', name: 'Français',  mistralName: 'French' },
      { key: 'Greek',   flag: '🇬🇷', name: 'Ελληνικά', mistralName: 'Modern Greek' },
    ];

    // ── État global ───────────────────────────────────────────
    let allWords    = [];
    let progressMap = {};
    let currentWord = "";
    let currentLang = "";
    let hintUsed    = false;   // ← flag aide utilisée

    // ── Au chargement ─────────────────────────────────────────
    window.addEventListener('load', () => {
      const pwdOk      = localStorage.getItem(KEY_PWD_OK) === "true";
      const token      = localStorage.getItem(KEY_GG_TOKEN);
      const expiry     = parseInt(localStorage.getItem(KEY_GG_EXPIRY) || "0");
      const tokenValid = token && Date.now() < expiry;

      if (pwdOk && tokenValid) showScreen('screen-lang');
      else if (pwdOk)          showScreen('screen-google');
      else                     showScreen('screen-password');
    });

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Mot de passe ──────────────────────────────────────────
    async function checkPassword() {
      const input = document.getElementById('pwd-input').value;
      const hash  = await sha256(input);
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(KEY_PWD_OK, "true");
        showScreen('screen-google');
      } else {
        document.getElementById('error-msg').textContent = 'mot de passe incorrect';
        document.getElementById('pwd-input').value = '';
        document.getElementById('pwd-input').focus();
      }
    }
    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    // ── Google OAuth ──────────────────────────────────────────
    let tokenClient;

    function initGoogleClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.error) {
            document.getElementById('google-error-msg').textContent = 'Erreur Google : ' + response.error;
            return;
          }
          const expiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem(KEY_GG_TOKEN, response.access_token);
          localStorage.setItem(KEY_GG_EXPIRY, expiry.toString());
          showScreen('screen-lang');
        }
      });
    }

    function loginGoogle() {
      if (!tokenClient) {
        document.getElementById('google-error-msg').textContent = 'Chargement en cours, réessaie dans un instant...';
        setTimeout(loginGoogle, 1000);
        return;
      }
      tokenClient.requestAccessToken();
    }

    window.addEventListener('load', () => {
      const interval = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts) {
          initGoogleClient();
          clearInterval(interval);
        }
      }, 200);
    });

    // ── Sélection de langue ───────────────────────────────────
    async function selectLanguage(lang) {
      currentLang = lang;
      document.getElementById('lang-tag').textContent = `← ${lang}`;
      showScreen('screen-practice');
      resetPracticeUI();
      document.getElementById('word-count').textContent = 'chargement...';
      await Promise.all([ loadWords(lang), loadProgress(lang) ]);
      pickWeightedWord();
    }

    function resetPracticeUI() {
      hintUsed = false;
      document.getElementById('current-word').textContent  = '…';
      document.getElementById('word-stars').textContent    = '☆☆☆';
      document.getElementById('word-stars').className      = 'stars s0';
      document.getElementById('hint-used-badge').classList.remove('visible');
      document.getElementById('hint-box').classList.remove('visible');
      document.getElementById('hint-text').textContent     = '';
      document.getElementById('sentence-input').value      = '';
      document.getElementById('feedback-box').classList.remove('visible', 'correct', 'incorrect');
      document.getElementById('feedback-text').textContent  = '';
      document.getElementById('no-count-notice').textContent = '';
    }

    // ── Lecture mots ──────────────────────────────────────────
    async function loadWords(sheetName) {
      const token = localStorage.getItem(KEY_GG_TOKEN);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!B:B`;
      try {
        const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        allWords = (data.values || []).map(r => r[0]).filter(w => w && w.trim());
      } catch (e) { allWords = []; }
    }

    // ── Lecture progression ───────────────────────────────────
    async function loadProgress(lang) {
      const token = localStorage.getItem(KEY_GG_TOKEN);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Progress!A:E`;
      progressMap = {};
      try {
        const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        (data.values || []).forEach((row, i) => {
          if (i === 0) return;
          const word     = row[0] || '';
          const rowLang  = row[1] || '';
          const correct  = parseInt(row[2]) || 0;
          const incorrect= parseInt(row[3]) || 0;
          if (word && rowLang === lang) {
            progressMap[word.toLowerCase()] = { correct, incorrect, rowIndex: i + 1 };
          }
        });
      } catch (e) {}
    }

    // ── Tirage pondéré ────────────────────────────────────────
    function getWeight(word) {
      const prog = progressMap[word.toLowerCase()];
      if (!prog) return 10;
      const net = prog.correct - prog.incorrect;
      if (net >= 3) return 1;
      if (net < 0)  return 8;
      return 5;
    }

    function pickWeightedWord() {
      if (allWords.length === 0) {
        document.getElementById('current-word').textContent = '—';
        document.getElementById('word-count').textContent   = 'aucun mot trouvé';
        return;
      }
      const weights = allWords.map(w => getWeight(w));
      const total   = weights.reduce((a, b) => a + b, 0);
      let rand      = Math.random() * total;
      let chosen    = allWords[0];
      for (let i = 0; i < allWords.length; i++) {
        rand -= weights[i];
        if (rand <= 0) { chosen = allWords[i]; break; }
      }
      currentWord = chosen;
      document.getElementById('current-word').textContent = currentWord;
      const remaining = allWords.filter(w => getWeight(w) > 1).length;
      document.getElementById('word-count').textContent =
        `${remaining} mot${remaining > 1 ? 's' : ''} à pratiquer`;
      updateStars(currentWord);
    }

    function updateStars(word) {
      const prog    = progressMap[word.toLowerCase()];
      const starsEl = document.getElementById('word-stars');
      if (!prog) { starsEl.textContent = '☆☆☆'; starsEl.className = 'stars s0'; return; }
      const net = prog.correct - prog.incorrect;
      if (net >= 3)      { starsEl.textContent = '★★★'; starsEl.className = 'stars s3'; }
      else if (net >= 2) { starsEl.textContent = '★★☆'; starsEl.className = 'stars s2'; }
      else if (net >= 1) { starsEl.textContent = '★☆☆'; starsEl.className = 'stars s1'; }
      else               { starsEl.textContent = '☆☆☆'; starsEl.className = 'stars s0'; }
    }

    function nextWord() {
      pickWeightedWord();
      hintUsed = false;
      document.getElementById('hint-used-badge').classList.remove('visible');
      document.getElementById('hint-box').classList.remove('visible');
      document.getElementById('hint-text').textContent     = '';
      document.getElementById('sentence-input').value      = '';
      document.getElementById('feedback-box').classList.remove('visible', 'correct', 'incorrect');
      document.getElementById('feedback-text').textContent  = '';
      document.getElementById('no-count-notice').textContent = '';
    }

    // ── Écriture progression ──────────────────────────────────
    async function saveProgress(word, isCorrect) {
      const token    = localStorage.getItem(KEY_GG_TOKEN);
      const key      = word.toLowerCase();
      const existing = progressMap[key];
      const now      = new Date().toISOString();

      if (existing) {
        const correct   = existing.correct   + (isCorrect ? 1 : 0);
        const incorrect = existing.incorrect + (isCorrect ? 0 : 1);
        const range     = `Progress!C${existing.rowIndex}:E${existing.rowIndex}`;
        const url       = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
        await fetch(url, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [[correct, incorrect, now]] })
        });
        progressMap[key].correct   = correct;
        progressMap[key].incorrect = incorrect;
      } else {
        const correct   = isCorrect ? 1 : 0;
        const incorrect = isCorrect ? 0 : 1;
        const url       = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Progress!A:E:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [[word, currentLang, correct, incorrect, now]] })
        });
        const data      = await res.json();
        const match     = (data.updates?.updatedRange || '').match(/(\d+)$/);
        const rowIndex  = match ? parseInt(match[1]) : null;
        progressMap[key] = { correct, incorrect, rowIndex };
      }
      updateStars(word);
    }

    // ── Mistral : Définition ──────────────────────────────────
    async function askHint() {
      const btn = document.getElementById('btn-hint');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Chargement…';

      document.getElementById('hint-box').classList.remove('visible');

      const langInfo = LANGS.find(l => l.key === currentLang);
      const langName = langInfo ? langInfo.mistralName : currentLang;

      // Prompt amélioré : ignore les noms propres, cherche le sens commun/lexical
      const prompt = `You are a vocabulary teacher. The learner is studying ${langName} vocabulary.

Give the definition and one example sentence for the word or expression: "${currentWord}"

Important rules:
- Focus on its meaning as a COMMON WORD or EXPRESSION in ${langName}, not as a proper noun, brand name, or place name.
- If the word has multiple meanings, give the most useful/common one for a language learner.
- If it is an expression or idiom, explain what it means in context.

Format exactly like this:
**Définition :** ...
**Exemple :** ...

Respond in ${langName}.`;

      try {
        const reply = await callMistral(prompt);
        document.getElementById('hint-text').innerHTML =
          reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        document.getElementById('hint-box').classList.add('visible');
        // Marque que l'aide a été utilisée
        hintUsed = true;
        document.getElementById('hint-used-badge').classList.add('visible');
      } catch (err) {
        document.getElementById('hint-text').textContent = 'Erreur : ' + err.message;
        document.getElementById('hint-box').classList.add('visible');
      }

      btn.disabled = false;
      btn.textContent = '💡 Définition';
    }

    // ── Mistral : Évaluation ──────────────────────────────────
    async function submitSentence() {
      const sentence = document.getElementById('sentence-input').value.trim();
      if (!sentence) return;

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Analyse…';

      const feedbackBox   = document.getElementById('feedback-box');
      const feedbackLabel = document.getElementById('feedback-label');
      const feedbackText  = document.getElementById('feedback-text');
      const noCountNotice = document.getElementById('no-count-notice');
      feedbackBox.classList.remove('visible', 'correct', 'incorrect');

      const langInfo = LANGS.find(l => l.key === currentLang);
      const langName = langInfo ? langInfo.mistralName : currentLang;

      // Prompt amélioré : exige une vraie compréhension, pas juste l'inclusion du mot
      const prompt = `You are a strict but encouraging ${langName} vocabulary teacher.

The learner is practicing the word/expression: "${currentWord}" in ${langName}.
Their sentence is: "${sentence}"

Evaluate the sentence using these strict criteria:
1. Is "${currentWord}" used correctly (grammar, meaning, register)?
2. Does the sentence DEMONSTRATE understanding of the word's meaning? 
   A sentence like "${currentWord} est bon" or "J'aime ${currentWord}" does NOT demonstrate understanding — it just includes the word without showing you know what it means.
   A good sentence uses the word in a context that reveals its meaning.

- If BOTH criteria are met: start with "✓" then briefly explain what's good.
- If the sentence is grammatically correct but doesn't demonstrate understanding: start with "✗" then explain that the sentence needs to show the meaning of the word, and give an example of a better sentence.
- If the word is used incorrectly: start with "✗" then explain the mistake and suggest a correction.

Respond in French. Be concise (2-3 sentences max).`;

      try {
        const reply     = await callMistral(prompt);
        const isCorrect = reply.startsWith('✓');

        feedbackLabel.textContent = isCorrect ? 'Correct !' : 'Pas tout à fait…';
        feedbackText.textContent  = reply;
        feedbackBox.classList.add('visible', isCorrect ? 'correct' : 'incorrect');

        // Ne compte pas si l'aide a été utilisée
        if (hintUsed) {
          noCountNotice.textContent = '(aide utilisée — non comptabilisé dans ta progression)';
        } else {
          noCountNotice.textContent = '';
          await saveProgress(currentWord, isCorrect);
        }

      } catch (err) {
        feedbackLabel.textContent = 'Erreur';
        feedbackText.textContent  = err.message;
        feedbackBox.classList.add('visible', 'incorrect');
      }

      btn.disabled = false;
      btn.textContent = 'Vérifier ma phrase ✓';
    }

    // ── Statistiques ──────────────────────────────────────────
    async function showStats() {
      showScreen('screen-stats');
      const grid = document.getElementById('stats-grid');
      grid.innerHTML = '<p style="color:var(--muted);font-style:italic;">Chargement…</p>';

      const token = localStorage.getItem(KEY_GG_TOKEN);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Progress!A:E`;

      try {
        const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        const rows = (data.values || []).slice(1); // skip header

        // Charge aussi le total de mots par langue
        const wordCounts = {};
        await Promise.all(LANGS.map(async (l) => {
          const r = await fetch(
            `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(l.key)}!B:B`,
            { headers: { Authorization: `Bearer ${token}` } }
          );
          const d = await r.json();
          wordCounts[l.key] = (d.values || []).filter(row => row[0] && row[0].trim()).length;
        }));

        // Construit les stats par langue
        const statsByLang = {};
        LANGS.forEach(l => {
          statsByLang[l.key] = { mastered: 0, learning: 0, struggling: 0, total: wordCounts[l.key] || 0 };
        });

        rows.forEach(row => {
          const lang      = row[1] || '';
          const correct   = parseInt(row[2]) || 0;
          const incorrect = parseInt(row[3]) || 0;
          if (!statsByLang[lang]) return;
          const net = correct - incorrect;
          if (net >= 3)     statsByLang[lang].mastered++;
          else if (net < 0) statsByLang[lang].struggling++;
          else              statsByLang[lang].learning++;
        });

        // Affiche
        grid.innerHTML = LANGS.map(l => {
          const s        = statsByLang[l.key];
          const practiced = s.mastered + s.learning + s.struggling;
          const pct      = s.total > 0 ? Math.round((s.mastered / s.total) * 100) : 0;
          const notStarted = s.total - practiced;
          return `
            <div class="stats-lang-block">
              <div class="stats-lang-title">
                <span class="flag">${l.flag}</span>
                <span>${l.name}</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
              </div>
              <div class="stats-row">
                <span class="label">Total de mots</span>
                <span class="value">${s.total}</span>
              </div>
              <div class="stats-row">
                <span class="label">★★★ Maîtrisés</span>
                <span class="value green">${s.mastered}</span>
              </div>
              <div class="stats-row">
                <span class="label">★☆☆ En cours</span>
                <span class="value yellow">${s.learning}</span>
              </div>
              <div class="stats-row">
                <span class="label">☆☆☆ Pas encore commencé</span>
                <span class="value muted">${notStarted}</span>
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        grid.innerHTML = `<p style="color:var(--error)">Erreur : ${err.message}</p>`;
      }
    }

    // ── Appel Mistral ─────────────────────────────────────────
    async function callMistral(prompt) {
      const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${MISTRAL_KEY}`
        },
        body: JSON.stringify({
          model: MISTRAL_MODEL,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 350,
          temperature: 0.5
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content.trim();
    }

    // ── SHA-256 ───────────────────────────────────────────────
    async function sha256(message) {
      const msgBuffer  = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
  </script>
