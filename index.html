<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2e2e2e;
      --text:    #e8e3d9;
      --muted:   #6b6560;
      --accent:  #c9a96e;
      --error:   #c96e6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s ease;
    }
    .screen.active { display: flex; }

    .app-title {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    .app-subtitle {
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: -1.5rem;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-google {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: var(--accent); background: #222; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error-msg {
      color: var(--error);
      font-size: 0.85rem;
      font-style: italic;
      min-height: 1.2em;
      text-align: center;
    }
    .info-msg {
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
      text-align: center;
      line-height: 1.6;
    }

    /* ── App principale ── */
    #screen-app {
      max-width: 520px;
      align-items: flex-start;
    }

    .app-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .words-container {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 60vh;
      overflow-y: auto;
    }

    .word-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
    }
    .word-item:last-child { border-bottom: none; }

    .loading {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      width: 100%;
      padding: 1rem 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── Écran 1 : Mot de passe ── -->
  <div class="screen" id="screen-password">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <div class="input-group">
      <input type="password" id="pwd-input" placeholder="mot de passe" autofocus />
      <button class="btn-primary" onclick="checkPassword()">Entrer</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- ── Écran 2 : Connexion Google ── -->
  <div class="screen" id="screen-google">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <p class="info-msg">
      Connecte ton compte Google pour accéder<br/>à ta liste de vocabulaire.
    </p>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.09-6.09C34.46 3.09 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.08 5.5C12.43 13.61 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.59C43.18 37.13 46.1 31.27 46.1 24.5z"/>
        <path fill="#FBBC05" d="M10.72 28.28A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.72-4.28l-7.08-5.5A22.9 22.9 0 0 0 1 24c0 3.68.88 7.16 2.64 10.22l7.08-5.94z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.49-4.95l-7.19-5.59c-1.82 1.22-4.15 1.94-6.3 1.94-6.26 0-11.57-4.11-13.28-9.72l-7.08 5.94C7.07 41.52 14.82 47 24 47z"/>
      </svg>
      Se connecter avec Google
    </button>
    <p class="error-msg" id="google-error-msg"></p>
  </div>

  <!-- ── Écran 3 : App principale ── -->
  <div class="screen" id="screen-app">
    <div class="app-header">
      <h1 class="app-title">Vocab</h1>
      <span class="status" id="status">chargement...</span>
    </div>
    <div class="words-container" id="words-container">
      <p class="loading">Chargement des mots...</p>
    </div>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────
    const PASSWORD_HASH = "37a3fe961eeb61778465d62305d999d7c1d550ee99af1efd530a61f1a03be39b";
    const CLIENT_ID     = "742808037031-61r1roac158e5ltrosgahkemc4r9e7n1.apps.googleusercontent.com";
    const SCOPES        = "https://www.googleapis.com/auth/spreadsheets";
    const SHEET_ID      = "1PlDftzA1wQYikkSRc-GDS0jvY_mOaj-M673TfAqxVxc";

    // ── Clés localStorage ─────────────────────────────────────
    const KEY_PWD_OK    = "vocab_pwd_ok";
    const KEY_GG_TOKEN  = "vocab_google_token";
    const KEY_GG_EXPIRY = "vocab_google_expiry";

    // ── Au chargement ─────────────────────────────────────────
    window.addEventListener('load', () => {
      const pwdOk      = localStorage.getItem(KEY_PWD_OK) === "true";
      const token      = localStorage.getItem(KEY_GG_TOKEN);
      const expiry     = parseInt(localStorage.getItem(KEY_GG_EXPIRY) || "0");
      const tokenValid = token && Date.now() < expiry;

      if (pwdOk && tokenValid) {
        showScreen('screen-app');
        loadWords('English');           // ← on charge les mots immédiatement
      } else if (pwdOk) {
        showScreen('screen-google');
      } else {
        showScreen('screen-password');
      }
    });

    // ── Gestion des écrans ────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Mot de passe ──────────────────────────────────────────
    async function checkPassword() {
      const input = document.getElementById('pwd-input').value;
      const hash  = await sha256(input);
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(KEY_PWD_OK, "true");
        showScreen('screen-google');
      } else {
        document.getElementById('error-msg').textContent = 'mot de passe incorrect';
        document.getElementById('pwd-input').value = '';
        document.getElementById('pwd-input').focus();
      }
    }

    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    // ── Google OAuth ──────────────────────────────────────────
    let tokenClient;

    function initGoogleClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.error) {
            document.getElementById('google-error-msg').textContent =
              'Erreur Google : ' + response.error;
            return;
          }
          const expiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem(KEY_GG_TOKEN, response.access_token);
          localStorage.setItem(KEY_GG_EXPIRY, expiry.toString());
          showScreen('screen-app');
          loadWords('English');         // ← on charge les mots après connexion
        }
      });
    }

    function loginGoogle() {
      if (!tokenClient) {
        document.getElementById('google-error-msg').textContent =
          'Chargement en cours, réessaie dans un instant...';
        setTimeout(loginGoogle, 1000);
        return;
      }
      tokenClient.requestAccessToken();
    }

    window.addEventListener('load', () => {
      const interval = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts) {
          initGoogleClient();
          clearInterval(interval);
        }
      }, 200);
    });

    // ── Lecture Google Sheets ─────────────────────────────────
    // On lit la colonne B de l'onglet demandé et on filtre les cellules vides
    async function loadWords(sheetName) {
      const token = localStorage.getItem(KEY_GG_TOKEN);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!B:B`;

      try {
        const res  = await fetch(url, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.error) {
          showError(`Erreur Sheets : ${data.error.message}`);
          return;
        }

        // data.values est un tableau de tableaux : [["mot1"], ["mot2"], ...]
        const words = (data.values || [])
          .map(row => row[0])             // prend la première cellule de chaque ligne
          .filter(w => w && w.trim());    // enlève les cellules vides

        displayWords(words, sheetName);

      } catch (err) {
        showError('Erreur réseau : ' + err.message);
      }
    }

    function displayWords(words, sheetName) {
      const container = document.getElementById('words-container');
      const status    = document.getElementById('status');

      status.textContent = `${words.length} mots · ${sheetName}`;

      container.innerHTML = words
        .map(w => `<div class="word-item">${w}</div>`)
        .join('');
    }

    function showError(msg) {
      document.getElementById('words-container').innerHTML =
        `<p class="loading" style="color:var(--error)">${msg}</p>`;
    }

    // ── SHA-256 ───────────────────────────────────────────────
    async function sha256(message) {
      const msgBuffer  = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
  </script>

</body>
</html>
