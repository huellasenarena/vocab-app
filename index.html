<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2e2e2e;
      --text:    #e8e3d9;
      --muted:   #6b6560;
      --accent:  #c9a96e;
      --error:   #c96e6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Écrans ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease;
    }
    .screen.active { display: flex; }

    .app-title {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    .app-subtitle {
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: -1.5rem;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); }

    .btn-google {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: var(--accent); background: #222; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error-msg {
      color: var(--error);
      font-size: 0.85rem;
      font-style: italic;
      min-height: 1.2em;
      text-align: center;
    }
    .info-msg {
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Sélecteur de langue ── */
    .lang-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .lang-btn:hover {
      border-color: var(--accent);
      background: #222;
      transform: translateY(-2px);
    }
    .lang-btn .flag { font-size: 1.8rem; }
    .lang-btn .lang-name {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Écran de pratique ── */
    #screen-practice {
      max-width: 480px;
    }

    .practice-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lang-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .lang-tag:hover { border-color: var(--accent); }

    /* ── Carte du mot ── */
    .word-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .word-label {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .word-main {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.2;
    }

    .word-count {
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    /* ── Boutons d'action ── */
    .action-row {
      width: 100%;
      display: flex;
      gap: 0.75rem;
    }
    .action-row .btn-secondary { font-size: 0.9rem; padding: 0.75rem; }
    .action-row .btn-primary   { font-size: 0.9rem; padding: 0.75rem; }

    .loading-text {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── Écran 1 : Mot de passe ── -->
  <div class="screen" id="screen-password">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <div class="input-group">
      <input type="password" id="pwd-input" placeholder="mot de passe" autofocus />
      <button class="btn-primary" onclick="checkPassword()">Entrer</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- ── Écran 2 : Connexion Google ── -->
  <div class="screen" id="screen-google">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">ton espace de pratique</p>
    <p class="info-msg">
      Connecte ton compte Google pour accéder<br/>à ta liste de vocabulaire.
    </p>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.09-6.09C34.46 3.09 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.08 5.5C12.43 13.61 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.59C43.18 37.13 46.1 31.27 46.1 24.5z"/>
        <path fill="#FBBC05" d="M10.72 28.28A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.72-4.28l-7.08-5.5A22.9 22.9 0 0 0 1 24c0 3.68.88 7.16 2.64 10.22l7.08-5.94z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.49-4.95l-7.19-5.59c-1.82 1.22-4.15 1.94-6.3 1.94-6.26 0-11.57-4.11-13.28-9.72l-7.08 5.94C7.07 41.52 14.82 47 24 47z"/>
      </svg>
      Se connecter avec Google
    </button>
    <p class="error-msg" id="google-error-msg"></p>
  </div>

  <!-- ── Écran 3 : Sélecteur de langue ── -->
  <div class="screen" id="screen-lang">
    <h1 class="app-title">Vocab</h1>
    <p class="app-subtitle">quelle langue aujourd'hui ?</p>
    <div class="lang-grid">
      <button class="lang-btn" onclick="selectLanguage('English')">
        <span class="flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('Spanish')">
        <span class="flag">🇪🇸</span>
        <span class="lang-name">Español</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('French')">
        <span class="flag">🇫🇷</span>
        <span class="lang-name">Français</span>
      </button>
      <button class="lang-btn" onclick="selectLanguage('Greek')">
        <span class="flag">🇬🇷</span>
        <span class="lang-name">Ελληνικά</span>
      </button>
    </div>
    <p class="error-msg" id="lang-error-msg"></p>
  </div>

  <!-- ── Écran 4 : Pratique ── -->
  <div class="screen" id="screen-practice">
    <div class="practice-header">
      <h1 class="app-title">Vocab</h1>
      <!-- Clic sur le tag langue → retour au sélecteur -->
      <span class="lang-tag" id="lang-tag" onclick="showScreen('screen-lang')">← langue</span>
    </div>

    <!-- Carte du mot -->
    <div class="word-card" id="word-card">
      <span class="word-label">mot du jour</span>
      <span class="word-main" id="current-word">…</span>
      <span class="word-count" id="word-count"></span>
    </div>

    <!-- Boutons -->
    <div class="action-row">
      <button class="btn-secondary" id="btn-hint" onclick="askHint()">
        💡 Définition
      </button>
      <button class="btn-primary" onclick="nextWord()">
        Autre mot →
      </button>
    </div>

    <p class="loading-text" id="practice-status"></p>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────
    const PASSWORD_HASH = "37a3fe961eeb61778465d62305d999d7c1d550ee99af1efd530a61f1a03be39b";
    const CLIENT_ID     = "742808037031-61r1roac158e5ltrosgahkemc4r9e7n1.apps.googleusercontent.com";
    const SCOPES        = "https://www.googleapis.com/auth/spreadsheets";
    const SHEET_ID      = "1PlDftzA1wQYikkSRc-GDS0jvY_mOaj-M673TfAqxVxc";

    const KEY_PWD_OK    = "vocab_pwd_ok";
    const KEY_GG_TOKEN  = "vocab_google_token";
    const KEY_GG_EXPIRY = "vocab_google_expiry";
    const KEY_LANG      = "vocab_last_lang";

    // ── État global ───────────────────────────────────────────
    let allWords       = [];     // tous les mots de l'onglet actif
    let currentWord    = "";     // mot affiché en ce moment
    let currentLang    = "";     // langue active

    // ── Au chargement ─────────────────────────────────────────
    window.addEventListener('load', () => {
      const pwdOk      = localStorage.getItem(KEY_PWD_OK) === "true";
      const token      = localStorage.getItem(KEY_GG_TOKEN);
      const expiry     = parseInt(localStorage.getItem(KEY_GG_EXPIRY) || "0");
      const tokenValid = token && Date.now() < expiry;

      if (pwdOk && tokenValid) {
        showScreen('screen-lang');
      } else if (pwdOk) {
        showScreen('screen-google');
      } else {
        showScreen('screen-password');
      }
    });

    // ── Gestion des écrans ────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Mot de passe ──────────────────────────────────────────
    async function checkPassword() {
      const input = document.getElementById('pwd-input').value;
      const hash  = await sha256(input);
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(KEY_PWD_OK, "true");
        showScreen('screen-google');
      } else {
        document.getElementById('error-msg').textContent = 'mot de passe incorrect';
        document.getElementById('pwd-input').value = '';
        document.getElementById('pwd-input').focus();
      }
    }
    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    // ── Google OAuth ──────────────────────────────────────────
    let tokenClient;

    function initGoogleClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.error) {
            document.getElementById('google-error-msg').textContent =
              'Erreur Google : ' + response.error;
            return;
          }
          const expiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem(KEY_GG_TOKEN, response.access_token);
          localStorage.setItem(KEY_GG_EXPIRY, expiry.toString());
          showScreen('screen-lang');
        }
      });
    }

    function loginGoogle() {
      if (!tokenClient) {
        document.getElementById('google-error-msg').textContent =
          'Chargement en cours, réessaie dans un instant...';
        setTimeout(loginGoogle, 1000);
        return;
      }
      tokenClient.requestAccessToken();
    }

    window.addEventListener('load', () => {
      const interval = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts) {
          initGoogleClient();
          clearInterval(interval);
        }
      }, 200);
    });

    // ── Sélection de langue ───────────────────────────────────
    async function selectLanguage(lang) {
      currentLang = lang;
      localStorage.setItem(KEY_LANG, lang);
      document.getElementById('lang-tag').textContent = `← ${lang}`;
      document.getElementById('lang-error-msg').textContent = '';

      showScreen('screen-practice');
      document.getElementById('current-word').textContent = '…';
      document.getElementById('word-count').textContent = 'chargement...';
      document.getElementById('practice-status').textContent = '';

      await loadWords(lang);
    }

    // ── Lecture Google Sheets ─────────────────────────────────
    async function loadWords(sheetName) {
      const token = localStorage.getItem(KEY_GG_TOKEN);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!B:B`;

      try {
        const res  = await fetch(url, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.error) {
          document.getElementById('word-count').textContent = 'erreur de chargement';
          return;
        }

        allWords = (data.values || [])
          .map(row => row[0])
          .filter(w => w && w.trim());

        pickRandomWord();

      } catch (err) {
        document.getElementById('word-count').textContent = 'erreur réseau';
      }
    }

    // ── Tirage aléatoire ──────────────────────────────────────
    function pickRandomWord() {
      if (allWords.length === 0) {
        document.getElementById('current-word').textContent = '—';
        document.getElementById('word-count').textContent = 'aucun mot trouvé';
        return;
      }
      const idx = Math.floor(Math.random() * allWords.length);
      currentWord = allWords[idx];
      document.getElementById('current-word').textContent = currentWord;
      document.getElementById('word-count').textContent = `${allWords.length} mots disponibles`;
      document.getElementById('practice-status').textContent = '';
    }

    function nextWord() {
      pickRandomWord();
    }

    // ── Définition (placeholder — Mistral arrive bientôt) ─────
    function askHint() {
      document.getElementById('practice-status').textContent =
        '✨ La définition via Mistral arrive à la prochaine étape !';
    }

    // ── SHA-256 ───────────────────────────────────────────────
    async function sha256(message) {
      const msgBuffer  = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
  </script>

</body>
</html>
